apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-container
        image: 292960609511.dkr.ecr.ap-south-1.amazonaws.com/my-nginx-repo:latest
        ports:
        - containerPort: 80